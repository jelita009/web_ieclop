<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisi IECLOP - Detail</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .line { width: 2px; height: 30px; background: linear-gradient(to bottom, #3b82f6, transparent); margin: 0 auto; }
        .status-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
    </style>
</head>
<body class="bg-grid">

     <nav class="navbar-main">
        <div class="flex items-center space-x-3">
            <img src="image/logo_IECLOP.png" alt="Logo IECLOP" class="h-10 md:h-12 w-auto object-contain">
            <span class="text-xl md:text-2xl font-black tracking-tighter uppercase">IECLOP</span>
        </div>
        
        <div class="hidden md:flex items-center space-x-10 font-semibold tracking-wide">
            <a href="index.html" id="nav-home">Beranda</a>
            <a href="about.html" id="nav-about">Tentang</a>
            <a href="struktur.html" id="nav-structure">Struktur</a>
            
            <div class="dropdown">
            <button class="nav-link flex items-center group">
                <span>Divisi</span> 
                <i class="fa-solid fa-chevron-down text-xs ml-2 transition-transform group-hover:rotate-180"></i>
            </button>
            <div class="dropdown-menu-wrapper">
                <div class="dropdown-content">
                    <a href="education.html" onclick="showDivision('EDU')">
                        <i class="fa-solid fa-users-gears mr-2"></i> Education
                    </a>
                    <a href="infocom.html" onclick="showDivision('INF')">
                        <i class="fa-solid fa-book-open-reader mr-2"></i> Infocom
                    </a>
                    <a href="regen.html" onclick="showDivision('REG')">
                        <i class="fa-solid fa-bullhorn mr-2"></i> Regeneration
                    </a>
                    <a href="publicRL.html" onclick="showDivision('PR')">
                        <i class="fa-solid fa-bullhorn mr-2"></i> Public Relation
                    </a>
                    <a href="olympic.html" onclick="showDivision('OLY')">
                        <i class="fa-solid fa-bullhorn mr-2"></i> Olympic
                    </a>
                   <a href="https://www.flaticon.com/free-icons/document" title="document icons">Document icons created by Awicon - Flaticon</a> 
                </div>
            </div>
        </div>

         <a href="memory.html" class="nav-link" id="nav-structure">memory</a>
        </div>

        <div class="flex items-center space-x-6">
            <div class="lang-container">
                <span onclick="changeLanguage('id')" id="btn-id" class="lang-link lang-active">ID</span>
                <span class="text-gray-500">|</span>
                <span onclick="changeLanguage('en')" id="btn-en" class="lang-link">EN</span>
            </div>
            <button onclick="window.location.href='login.html'" class="admin-login-btn">
                <i class="fa-solid fa-user-shield"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-16" id="header-section">
            <h1 id="div-name" class="text-6xl font-black tracking-tighter mb-4 uppercase text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">DIVISION</h1>
            <p id="div-desc" class="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed"></p>
        </header>

        <section class="mb-24">
            <div class="flex flex-col items-center">
                <div class="glass p-6 text-center w-56 border-blue-500/30 hover:border-blue-500 transition-all duration-500">
                    <div class="w-24 h-24 mx-auto rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 p-1 mb-4">
                        <img id="leader-img" src="" class="w-full h-full rounded-full object-cover bg-black" alt="Leader">
                    </div>
                    <h3 id="leader-name" class="font-bold text-lg">Nama Ketua</h3>
                    <p class="text-blue-400 text-xs font-black uppercase tracking-widest">Head of Division</p>
                </div>

                <div class="line"></div>

                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 w-full" id="members-container">
                    </div>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <i class="fa-solid fa-list-check text-blue-500"></i> WORK PROGRAMS
            </h2>
            <div class="grid gap-4" id="proker-container">
                </div>
        </section>
    </main>

    <script>
        // DATA SEMUA DIVISI
        const allDivisions = {
            "Infocom": {
                desc: "Information & Communication. Mengelola media sosial, branding visual, dan website resmi IECLOP.",
                leader: "Ririn Rahmadani",
                leaderImg: "img/kadiv-infocom.png",
                members: ["Diva Faradisa", "Raihan Saputra", "Muzzakir Rifaa", "Shafrijal Irmawan", "Putri Tarisa"]
            },
            "Education": {
                desc: "Fokus pada pengembangan skill bahasa Inggris anggota melalui Weekly Study dan TOEFL Preparation.",
                leader: "Fauzan Arief Nugraha",
                leaderImg: "img/kadiv-edu.png",
                members: ["Syawali Akbar", "Chaqila Chifa", "Friyal Nabila", "Zalfa Nur Alya", "Cut Syifa"]
            },
            "Regeneration": {
                desc: "Bertanggung jawab atas kaderisasi, penerimaan anggota baru, dan bonding internal pengurus.",
                leader: "Livia Safirani",
                leaderImg: "img/kadiv-regen.png",
                members: ["Chellsi Monica", "Lisa Ayu", "Syifa Dwi", "Nadira Ulfa", "Nazwa Friyal"]
            },
            "Olympic": {
                desc: "Membina atlet untuk kompetisi nasional seperti Debate, Speech, dan Newscasting.",
                leader: "Mila Rahmadani",
                leaderImg: "img/kadiv-olim.png",
                members: ["Ghina Najwa", "Ziyaul Fahmi", "Nurul Hikmah", "Putri Mulyana", "Nurwahida"]
            },
            "Public Relation": {
                desc: "Menjalin kerjasama dengan pihak eksternal, alumni, dan ormawa lainnya di lingkungan PNL.",
                leader: "Faza Humairah",
                leaderImg: "img/kadiv-pr.png",
                members: ["Santi Melvira", "Muklisah", "Karimullah", "Intan Nadia", "Nasywa Deby"]
            }
        };

        // AMBIL PARAMETER DARI URL (Contoh: divisi.html?name=Infocom)
        const params = new URLSearchParams(window.location.search);
        const divName = params.get('name') || "Infocom";
        const data = allDivisions[divName];

        function renderPage() {
            if(!data) return;

            // Header & Leader
            document.getElementById('div-name').innerText = divName;
            document.getElementById('div-desc').innerText = data.desc;
            document.getElementById('leader-name').innerText = data.leader;
            document.getElementById('leader-img').src = data.leaderImg;

            // Members
            const memContainer = document.getElementById('members-container');
            data.members.forEach(m => {
                memContainer.innerHTML += `
                    <div class="glass p-4 text-center group hover:bg-white/5 transition-all">
                        <img src="https://ui-avatars.com/api/?name=${m}&background=random" class="w-12 h-12 rounded-full mx-auto mb-2 opacity-60 group-hover:opacity-100">
                        <p class="text-xs font-bold">${m}</p>
                    </div>
                `;
            });

            // Proker (Sync dengan Admin)
            const prokerContainer = document.getElementById('proker-container');
            // Kita ambil data proker yang sama dengan di admin.html
            const prokerList = {
                "Infocom": ["Update Website UKM", "Postingan IG Mingguan", "Desain PDH Day"],
                "Education": ["Weekly Study", "TOEFL Simulation", "English Camp"],
                "Regeneration": ["Open Recruitment", "Inauguration Night", "Internal Bonding"],
                "Olympic": ["Olympic Practice", "Debate Competition", "Speech Workshop"],
                "Public Relation": ["MOU Perusahaan", "Media Partner", "Alumni Database"]
            }[divName] || [];

            prokerList.forEach((p, index) => {
                const taskId = `${divName}-${index}`.replace(/\s+/g, '-');
                const isDone = localStorage.getItem(taskId) === "true";

                prokerContainer.innerHTML += `
                    <div class="glass p-6 flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center ${isDone ? 'bg-blue-500/20 text-blue-500' : 'bg-white/5 text-gray-500'}">
                                <i class="fa-solid ${isDone ? 'fa-circle-check' : 'fa-circle-notch fa-spin'}"></i>
                            </div>
                            <div>
                                <h4 class="font-bold ${isDone ? 'text-gray-400' : 'text-white'}">${p}</h4>
                                <p class="text-[10px] text-gray-600 uppercase font-black">Serial No: IE-${index+101}</p>
                            </div>
                        </div>
                        <span class="status-tag ${isDone ? 'bg-blue-500/20 text-blue-400' : 'bg-white/5 text-gray-500'}">
                            ${isDone ? 'COMPLETED' : 'IN PROGRESS'}
                        </span>
                    </div>
                `;
            });
        }

        renderPage();
    </script>
</body>
</html>
