<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories - UKM IECLOP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/memoryPage.css">
</head>
<body class="text-white antialiased">
    <div class="overlay"></div>

    <main-navbar></main-navbar>

    <section class="memory-container">
        <div class="memory-header">
            <div class="accent-line mx-auto"></div>
            <h1>Our Shared <span class="highlight">Memories</span></h1>
            <p>Setiap foto menceritakan sebuah cerita perjuangan dan kebersamaan kami di IECLOP.</p>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item potrait">
                <img src="img/memories/P24.JPG" alt="Memory 1">
                <div class="item-overlay"><span>Moment 2024</span></div>
            </div>
            <div class="gallery-item lanscape">
                <img src="img/memories/L21.JPG" alt="Memory 2">
                <div class="item-overlay"><span>Activity</span></div>
            </div>
            <div class="gallery-item potrait">
                <img src="img/memories/P25.JPG" alt="Memory 3">
                <div class="item-overlay"><span>Documentation</span></div>
            </div>
            <div class="gallery-item lanscape">
                <img src="img/memories/L22.JPG" alt="Memory 4">
                <div class="item-overlay"><span>Group Photo</span></div>
            </div>
            <div class="gallery-item potrait"><img src="img/memories/P28.JPG" alt=""><div class="item-overlay"><span>Team</span></div></div>
            <div class="gallery-item lanscape"><img src="img/memories/L29.JPG" alt=""><div class="item-overlay"><span>Workshop</span></div></div>
            </div>
    </section>

    <footer class="footer">
        <div class="flex justify-center space-x-6 mb-4 text-2xl">
            <a href="#" class="hover:text-blue-500 transition"><i class="bi bi-youtube"></i></a>
            <a href="#" class="hover:text-blue-400 transition"><i class="bi bi-discord"></i></a>
            <a href="#" class="hover:text-pink-500 transition"><i class="bi bi-instagram"></i></a>
        </div>
        <p>Copyright &copy; 2026 INFOCOM IECLOP. All Rights Reserved.</p>
    </footer>

    <script src="js/navbar.js"></script>
</body>
</html>
