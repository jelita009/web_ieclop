<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regeneration Division - IECLOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(30, 58, 138, 0.5); }
        .line-connector { width: 2px; height: 40px; background: linear-gradient(to bottom, #1e3a8a, transparent); margin: 0 auto; }
        .status-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .done-status { background: rgba(30, 58, 138, 0.3); color: #93c5fd; border: 1px solid rgba(147, 197, 253, 0.3); }
        .pending-status { background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white antialiased">
    <video autoplay muted loop playsinline class="video-bg"><source src="video/contoh.mp4" type="video/mp4"></video>
    <div class="overlay"></div>
    <main-navbar></main-navbar>
    <main class="max-w-6xl mx-auto px-6 py-12 relative z-10">
        <header class="text-center mb-16">
            <h1 id="div-name" class="text-5xl md:text-6xl font-black tracking-tighter mb-4 uppercase text-white"></h1>
            <p id="div-desc" class="text-justify leading-[1.8] tracking-[0.02em] text-blue-100 max-w-2xl mx-auto text-lg opacity-90"></p>
        </header>
        <section class="mb-24"><div class="flex flex-col items-center"><div class="glass-card p-6 flex flex-col items-center w-56 border-[#1e3a8a]/50"><img id="leader-img" src="" class="w-24 h-24 rounded-full mb-4 object-cover border-4 border-[#1e3a8a]"><h3 id="leader-name" class="font-bold text-center text-lg text-white"></h3><span data-i18n="headOfDiv" class="text-blue-300 text-[10px] font-black uppercase tracking-[0.2em] mt-1">KEPALA DIVISI</span></div><div class="line-connector"></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="members-grid"></div></div></section>
        <section><h2 class="text-2xl font-black mb-8 flex items-center gap-3 text-white"><i class="fa-solid fa-list-check text-[#3b82f6]"></i> <span data-i18n="prokerTitle">PROGRAM KERJA</span></h2><div class="grid gap-4" id="public-task-container"></div></section>
    </main>
    <footer class="footer mt-auto relative z-10"><div class="flex justify-center space-x-6 mb-4 text-2xl"><a href="#" class="text-white hover:text-blue-300 transition"><i class="bi bi-youtube"></i></a><a href="#" class="text-white hover:text-blue-300 transition"><i class="bi bi-discord"></i></a><a href="#" class="text-white hover:text-blue-300 transition"><i class="bi bi-instagram"></i></a></div><p>Copyright &copy; 2026 INFOCOM IECLOP. All Rights Reserved.</p></footer>
    
    <script>
        const divisionDetails = { 
            "Regeneration": { 
                leader: "Livia Safirani", leaderImg: "https://ui-avatars.com/api/?name=Livia+S&background=1e3a8a&color=fff", members: ["Anggota Regen 1", "Anggota Regen 2", "Anggota Regen 3", "Anggota Regen 4"], 
                id: { desc: "Mencari kader baru, membangun kebersamaan, dan menumbuhkan jiwa kepemimpinan di dalam UKM IECLOP.", tasks: ["Open Recruitment", "Home Coming", "PDH Day"] },
                en: { desc: "Finding new cadres, building togetherness, and fostering leadership spirit within UKM IECLOP.", tasks: ["Open Recruitment", "Home Coming", "PDH Day"] }
            } 
        };
        const params = new URLSearchParams(window.location.search);
        const divName = params.get('name') || "Regeneration"; 
        const data = divisionDetails[divName] || Object.values(divisionDetails)[0];
        function init() { if(!data) return; document.getElementById('div-name').innerText = divName.toUpperCase(); document.getElementById('leader-name').innerText = data.leader; document.getElementById('leader-img').src = data.leaderImg; const memberGrid = document.getElementById('members-grid'); memberGrid.innerHTML = ''; data.members.forEach(m => { memberGrid.innerHTML += `<div class="glass-card p-4 flex flex-col items-center w-40 opacity-80 hover:opacity-100 transition duration-500"><img src="https://ui-avatars.com/api/?name=${m}&background=random" class="w-12 h-12 rounded-full mb-2 border-2 border-white/20"><span class="text-xs font-bold text-center text-white">${m}</span></div>`; }); const savedLang = localStorage.getItem('preferredLang') || 'id'; window.updateLocalContent(savedLang); }
        window.updateLocalContent = function(lang) { if(!data) return; const langData = data[lang] || data['id']; document.getElementById('div-desc').innerText = langData.desc; const container = document.getElementById('public-task-container'); container.innerHTML = ''; langData.tasks.forEach((task, index) => { const taskId = `${divName}-${index}`; const isDone = localStorage.getItem(taskId) === "true"; const statusText = isDone ? (lang === 'id' ? 'TERLAKSANA' : 'COMPLETED') : (lang === 'id' ? 'PROSES' : 'ON PROGRESS'); container.innerHTML += `<div class="glass-card p-6 flex items-center justify-between group transition"><div class="flex items-center gap-5"><div class="w-12 h-12 rounded-full flex items-center justify-center ${isDone ? 'bg-[#1e3a8a] text-blue-200' : 'bg-white/10 text-gray-400'} border border-white/10"><i class="fa-solid ${isDone ? 'fa-check-double' : 'fa-circle-notch fa-spin'}"></i></div><h4 class="text-lg font-bold ${isDone ? 'text-gray-400' : 'text-white'}">${task}</h4></div><span class="status-tag ${isDone ? 'done-status' : 'pending-status'}">${statusText}</span></div>`; }); };
        init();
    </script>
    <script src="translate.js"></script><script src="js/navbar.js"></script>
</body>
</html>
