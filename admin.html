<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - IECLOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: 0.3s;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            cursor: pointer;
        }
        .task-item:hover { background: rgba(255, 255, 255, 0.07); }
        
        input[type="checkbox"] {
            width: 20px; height: 20px;
            accent-color: #3b82f6;
            margin-right: 15px;
        }
    </style>
</head>
<body class="bg-[#080808] text-white">
    <div class="overlay"></div>

    <nav class="navbar-main mb-10">
        <span class="text-xl font-black">ADMIN <span class="text-blue-500">DASHBOARD</span></span>
        <button onclick="logout()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-lg text-sm font-bold border border-red-500/30 hover:bg-red-500 hover:text-white transition">
            LOGOUT
        </button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <header class="mb-10">
            <h1 class="text-4xl font-black mb-2">Manajemen Tugas Divisi</h1>
            <p class="text-gray-400">Centang tugas yang sudah selesai untuk ditampilkan di halaman publik.</p>
        </header>

        <div class="grid md:grid-cols-3 gap-8" id="admin-task-container">
            </div>
    </main>

    <script>
        // Cek Login
        if(localStorage.getItem("adminLoggedIn") !== "true") window.location.href = "login.html";

        // Data Tugas (Sesuaikan dengan kebutuhanmu)
        const tasksData = {
            "Human Resource": ["Open Recruitment 2026", "Gathering Internal", "Pelatihan Kepemimpinan", "Evaluasi Anggota"],
            "Education": ["Web Development Workshop", "IoT Fundamental Class", "Sharing Session Alumni", "Lomba Coding"],
            "Public Relation": ["Postingan Instagram Mingguan", "MOU dengan Perusahaan", "Media Partner Event", "Update Website UKM"]
        };

        function renderTasks() {
            const container = document.getElementById('admin-task-container');
            container.innerHTML = "";

            for (const [divisi, tasks] of Object.entries(tasksData)) {
                let taskHtml = `<div class="admin-card p-6">
                    <h2 class="text-xl font-bold mb-4 text-blue-400 border-b border-white/10 pb-2">${divisi}</h2>`;
                
                tasks.forEach((task, index) => {
                    const taskId = `${divisi}-${index}`.replace(/\s+/g, '-');
                    const isChecked = localStorage.getItem(taskId) === "true";
                    
                    taskHtml += `
                        <label class="task-item">
                            <input type="checkbox" onchange="toggleTask('${taskId}', this.checked)" ${isChecked ? 'checked' : ''}>
                            <span class="${isChecked ? 'text-blue-400 line-through' : 'text-gray-300'}">${task}</span>
                        </label>
                    `;
                });

                taskHtml += `</div>`;
                container.innerHTML += taskHtml;
            }
        }

        function toggleTask(id, status) {
            localStorage.setItem(id, status);
            renderTasks(); // Refresh tampilan agar efek line-through muncul
        }

        function logout() {
            localStorage.removeItem("adminLoggedIn");
            window.location.href = "login.html";
        }

        renderTasks();
    </script>
</body>
</html>
