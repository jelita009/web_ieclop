<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - IECLOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        input {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#050505]">
    <div class="overlay"></div> <div class="login-box p-10 w-full max-w-md text-center z-10">
        <img src="image/logo_IECLOP.png" class="h-16 mx-auto mb-6" alt="Logo">
        <h2 class="text-3xl font-black mb-2 tracking-tighter">ADMIN PANEL</h2>
        <p class="text-gray-400 mb-8 text-sm">Silakan masuk untuk mengelola tugas divisi.</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full p-4 rounded-xl outline-none transition">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-xl outline-none transition">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition transform hover:scale-105 shadow-lg shadow-blue-500/30">
                MASUK SEKARANG
            </button>
        </div>
        <a href="index.html" class="inline-block mt-6 text-xs text-gray-500 hover:text-white transition">Kembali ke Beranda</a>
    </div>

    <script>
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Ganti username & password sesukamu di sini
            if(u === "admin" && p === "pnl2026") {
                localStorage.setItem("adminLoggedIn", "true");
                window.location.href = "admin.html";
            } else {
                alert("Akses Ditolak! Username atau Password salah.");
            }
        }
    </script>
</body>
</html>
